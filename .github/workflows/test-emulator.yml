name: Test SDK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (e.g., v0.3.0)'
        required: false
        default: 'v0.3.0'

permissions:
  packages: read
  contents: read

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nobuto-ura-hpc-hub/mncore2-emuenv-base:20240826
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
              build-essential ninja-build curl jq ca-certificates > /dev/null 2>&1

      - name: Run SDK tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: bash ci/test-sdk.sh
